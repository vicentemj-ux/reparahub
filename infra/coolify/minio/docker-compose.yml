services:
  minio:
    image: quay.io/minio/minio:RELEASE.2026-06-13T11-33-47Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://minio.reparahub.com}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://media.reparahub.com}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000"
      - "9001"
    restart: unless-stopped

volumes:
  minio_data:
